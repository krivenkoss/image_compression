[paths]
images_dir = images
coders_dir = coders
output_dir = output

[study]
name        = study_02_compare_with_original
reference   = original           ; locked in study_02; the .py forces this anyway
random_seed = 42

[images]
; Three classic grayscale standards covering low / mid / high complexity.
; The study script matches names case-insensitively against the images/
; directory; if Lena.bmp is missing it falls back to Peppers.bmp.
;filenames = Lena.bmp, Goldhill.bmp, Baboon.bmp
filenames = fr02.bmp, lenna.bmp, BABOON.BMP, goldhill.bmp 

[coders]
list = JPEG, ADCT, BPG, HEIF, AVIF


[coder.JPEG]
start = 1
stop  = 100     ; 100
step  = 1

[coder.ADCT]
start = 2
stop  = 200
step  = 1

[coder.BPG]
start = 2
stop  = 51
step  = 1

[coder.HEIF]
start = 1
stop  = 100
step  = 1

[coder.AVIF]
start = 1
stop  = 100
step  = 1

[noise]
; std values correspond to variances 0, 25, 49, 100, 196 respectively.
kinds      = gaussian
std_values = 0, 5, 7, 10, 14
mean       = 0
k          = 0.271
sigma0     = 23.74
rho_h      = 0.7
rho_v      = 0.7
kernel     = gauss
radius     = 2

[metrics]
list = psnr, haar_psi

[output]
write_csv   = true
write_xlsx  = true
write_plots = true
plot_dpi    = 150
; Axis limits for rate-distortion plots. Leave blank for autoscale.
; xmax = 60 is a sensible cap for the linear-CR plot; the log10(CR)
; plot uses its own auto-range.
plot_xmin   =
plot_xmax   = 60
plot_ymin   =
plot_ymax   =
