[paths]
images_dir = images
coders_dir = coders
output_dir = output

[study]
name        = study_02_compare_with_original
reference   = original           ; noisy | original  (locked to "original" in this study)
random_seed = 42

[images]
filenames = DIEGO.BMP, frisco.bmp          ; comma-separated

[coders]
list = JPEG, ADCT, BPG, HEIF, AVIF
;list = JPEG, HEIF

[coder.JPEG]
start = 1
stop  = 100
step  = 1

[coder.ADCT]
start = 2
stop  = 200
step  = 1

[coder.BPG]
start = 2
stop  = 51
step  = 1

[coder.HEIF]
start = 1
stop  = 100
step  = 1

[coder.AVIF]
start = 1
stop  = 100
step  = 1

[noise]
kinds      = gaussian
std_values = 5, 10, 14
mean       = 0
k          = 0.271
sigma0     = 23.74
rho_h      = 0.7
rho_v      = 0.7
kernel     = gauss
radius     = 2

[metrics]
list = psnr, psnr_hvs_m, ms_ssim, ssim, uqi, haar_psi, fsim
;list = psnr

[output]
write_csv   = true
write_xlsx  = true
write_plots = true
plot_dpi    = 150
; Axis limits for rate-distortion plots. Leave blank for autoscale.
plot_xmin   = 0
plot_xmax   = 60
plot_ymin   =
plot_ymax   =
